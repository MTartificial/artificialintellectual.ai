name: Morning Brief

on:
  schedule:
    - cron: '0 15 * * *'  # 7am Pacific (UTC-8 standard / UTC-7 daylight)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r morning-brief/requirements.txt

      - name: Generate morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python morning-brief/brief.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f morning-brief/output/latest.html
          git diff --staged --quiet || git commit -m "Automated morning brief - $(date +'%Y-%m-%d')"
          git push
